<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Reclamações - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    /* Efeitos de hover e transições */
    input {
        transition: all 0.3s ease;
    }
    
    button {
        transition: all 0.3s ease;
    }
    
    button:active {
        transform: scale(0.98);
    }
    
    /* Efeito de brilho no foco */
    input:focus {
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }
    
    /* Animação de pulso para loading */
    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
    
    .animate-pulse-slow {
        animation: pulse 2s infinite;
    }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-200 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <!-- Formulário compacto -->
            <div class="p-6">
                <!-- Cabeçalho com logo compacto -->
                <div class="flex flex-col items-center mb-6">
                    <div class="bg-gradient-to-r from-orange-400 to-orange-600 text-white text-3xl font-bold px-5 py-3 rounded-lg shadow-lg mb-3">
                        IPIL
                    </div>
                    <div class="text-center">
                        <div class="text-lg font-bold text-gray-800 tracking-tight">SISTEMA DE GESTÃO</div>
                        <div class="text-sm font-semibold text-orange-600">DE RECLAMAÇÕES E DENÚNCIAS</div>
                    </div>
                </div>

                <!-- Formulário de login -->
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="processo" class="block text-gray-700 font-medium mb-1 text-sm">Nº de Processo</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-hashtag text-gray-400 text-sm"></i>
                            </div>
                            <input type="number" id="processo" name="processo" required min="0" oninput="if(this.value.length>5) this.value=this.value.slice(0,5)"
                                   class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition duration-200 text-sm"
                                   placeholder="Digite o nº do processo">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-gray-700 font-medium mb-1 text-sm">Senha</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400 text-sm"></i>
                            </div>
                            <input type="password" id="password" name="password" required 
                                   class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition duration-200 text-sm"
                                   placeholder="Digite sua senha">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center">
                            <input type="checkbox" id="remember" class="h-3.5 w-3.5 text-orange-600 focus:ring-orange-500 border-gray-300 rounded">
                            <label for="remember" class="ml-2 text-gray-600">Lembrar-me</label>
                        </div>
                        <a href="./recuperar_senha.html" class="text-orange-600 hover:text-orange-800 font-medium transition duration-200 text-xs">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-orange-400 to-orange-600 hover:from-orange-500 hover:to-orange-700 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition duration-300 text-sm">
                        Entrar
                    </button>

                    <div class="text-center pt-1">
                        <p class="text-gray-600 text-xs">
                            Não tem uma conta? 
                            <a href="usuario/cadastro.html" class="text-orange-600 hover:text-orange-800 font-semibold transition duration-200">Cadastre-se</a>
                        </p>
                    </div>
                </form>

                <!-- Link para página inicial compacto -->
                <div class="mt-4 text-center">
                    <a href="./homepage.html" class="inline-flex items-center text-orange-600 hover:text-orange-800 font-medium transition duration-200 text-xs">
                        <i class="fas fa-arrow-left mr-1"></i>
                        Voltar para página inicial
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Rodapé compacto -->
        <div class="text-center mt-4 text-gray-500 text-[10px]">
            <p>© 2026 Instituto Politécnico Industrial de Luanda</p>
        </div>
    </div>

    <!-- Script de login -->
    <script src="./login.js"></script>
</body>
</html>
